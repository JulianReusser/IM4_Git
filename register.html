<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>Snoozy – Registrieren</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="login-card">

      <div class="login-logo">
        <video id="registerLogoVideo" autoplay muted playsinline loop preload="auto">
          <source src="img/sleeping.mp4" type="video/mp4">
          <img src="img/snoozy.png" alt="Snoozy Monster" />
        </video>
      </div>

      <h1>Konto erstellen</h1>
      <p class="subtitle">Erstelle dein Snoozy-Konto</p>

      <form id="registerForm">

        <div class="form-group">
          <label for="email">E-Mail</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16v16H4z" fill="none" stroke="none"/>
            </svg>
            <input type="email" id="email" placeholder="name@email.com" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Passwort</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Passwort wiederholen</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="confirmPassword" placeholder="••••••••" required />
          </div>
        </div>

        <div id="registerMessage" role="status" aria-live="polite"></div>

        <button type="submit" class="btn-register">
          Registrieren
        </button>

      </form>

      <p class="login-register">Bereits ein Konto? <a href="login.html">Jetzt einloggen</a>.</p>

      <p class="login-footer">Für Lehrer:innen &amp; Erzieher:innen</p>
    </div>

    <script src="js/register.js"></script>
  </body>
</html>
