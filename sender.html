<!doctype html>
<html lang="en">
  <head>
    <!-- Sendeseite zum Übertragen von Messwerten an das Backend.
         Sie dient dazu, Beispiel- oder Sensordaten an den Server zu schicken und die Speicherung zu testen. -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example Sender</title>
  </head>
  <body>
    <form id="dataForm">
      <label for="wert">Wert:</label>
      <input type="text" id="wert" name="wert" required />
      <input type="submit" name="submit" value="Submit" />
    </form>
    <div id="message"></div>
    <script src="js/sender.js"></script>
  </body>
</html>
