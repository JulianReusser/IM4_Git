<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>Snoozy – Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="login-card">
      <div class="login-logo">
        <video id="loginLogoVideo" autoplay muted playsinline loop preload="auto">
          <source src="img/sleeping.mp4" type="video/mp4" />
          <img src="img/snoozy.png" alt="Snoozy Monster" />
        </video>
      </div>

      <h1>Snoozy</h1>
      <p class="subtitle">Halte Snoozy am schlafen</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Benutzername</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <input type="email" id="email" placeholder="Dein Name" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Passwort</label>
          <div class="input-wrapper">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="Passwort" required />
          </div>
        </div>

        <div id="loginMessage" role="status" aria-live="polite"></div>

        <button type="submit" class="btn-login">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Einloggen
        </button>
      </form>

      <p class="login-register">Noch keinen Account? <a href="register.html">Hier registrieren</a>.</p>

      <p class="login-footer">Für Lehrer:innen &amp; Erzieher:innen</p>
    </div>

    <script src="js/login.js"></script>
  </body>
</html>
